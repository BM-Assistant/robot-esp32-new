<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
        }

        h1 {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            background-color: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .messages-box {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 1rem;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user {
            background-color: #3b82f6;
            align-self: flex-end;
        }

        .message.bot {
            background-color: #475569;
            align-self: flex-start;
        }

        .message.system {
            background-color: #334155;
            align-self: center;
            font-size: 0.85em;
            color: #94a3b8;
            border-radius: 20px;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #38bdf8;
        }

        button {
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        #mic-btn {
            background: #334155;
            font-size: 1.2rem;
        }

        #mic-btn:hover {
            background: #475569;
        }

        button:hover {
            opacity: 0.9;
        }

        .controls-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            max-width: 180px;
            margin: 0 auto;
        }

        .controls-container button {
            padding: 15px;
            font-size: 1.5rem;
            background-color: #334155;
        }

        .controls-container button:hover {
            background-color: #475569;
        }

        .control-up { grid-column: 2; }
        .control-left { grid-column: 1; }
        .control-down { grid-column: 2; }
        .control-right { grid-column: 3; }

    </style>
</head>

<body>

<h1>BM Assistant sterowanie</h1>

<div class="chat-container">

    <div class="messages-box" id="messages-box">
        <div class="message system">Oczekiwanie na połączenie...</div>
    </div>

    <div class="controls-container">
        <div></div>
        <button class="control-up" onclick="sendMove('przód')">⬆️</button>
        <div></div>

        <button class="control-left" onclick="sendMove('lewo')">⬅️</button>
        <button class="control-down" onclick="sendMove('tył')">⬇️</button>
        <button class="control-right" onclick="sendMove('prawo')">➡️</button>
    </div>

    <div class="input-group">
        <input type="text" id="prompt-input" placeholder="Powiedz robotowi co ma zrobić...">

        <button id="mic-btn">🎤</button>
        <button id="send-btn">Wyślij</button>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>

<script>
const promptInput = document.getElementById("prompt-input");
const sendBtn = document.getElementById("send-btn");
const micBtn = document.getElementById("mic-btn");
const messagesBox = document.getElementById("messages-box");

function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    messagesBox.appendChild(div);
    messagesBox.scrollTop = messagesBox.scrollHeight;
}

// SOCKET
const socket = io();

socket.on("connect", () => {
    addMessage("Połączono z serwerem", "system");
});

socket.on("server_response", (data) => {
    addMessage("Serwer: " + data.data, "system");
});

socket.on("disconnect", () => {
    addMessage("Rozłączono", "system");
});

// MOVE
async function sendMove(direction) {
    await fetch("/api/move", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({direction})
    });

    addMessage("Ruch: " + direction, "system");
}

// PROMPT
async function sendPrompt() {
    const text = promptInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    promptInput.value = "";

    const res = await fetch("/api/prompt", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    const data = await res.json();

    if (data.response) addMessage(data.response, "bot");
    else addMessage("Błąd API", "system");
}

sendBtn.onclick = sendPrompt;
promptInput.addEventListener("keypress", e => {
    if (e.key === "Enter") sendPrompt();
});

// MICROPHONE 🎤
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pl-PL";
recognition.interimResults = false;
recognition.continuous = false;

micBtn.onclick = () => {
    try {
        recognition.start();
        addMessage("🎤 Słucham...", "system");
    } catch (e) {
        addMessage("Mikrofon już działa", "system");
    }
};

recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;

    promptInput.value = text;
    // addMessage("🎤 " + text, "user");

    // 🔥 jeśli chcesz auto-send, odkomentuj:
    // sendPrompt();
};

recognition.onerror = (e) => {
    addMessage("Błąd mikrofonu: " + e.error, "system");
};

</script>

</body>
</html>
