<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Robota ESP-32</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
        }

        h1 {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            background-color: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .messages-box {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 1rem;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user {
            background-color: #3b82f6;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message.bot {
            background-color: #475569;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .message.system {
            background-color: #334155;
            align-self: center;
            font-size: 0.85em;
            color: #94a3b8;
            border-radius: 20px;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #38bdf8;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .controls-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            max-width: 180px;
            margin: 0 auto;
        }

        .controls-container button {
            padding: 15px;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #334155;
            transition: background-color 0.2s, transform 0.1s;
        }

        .controls-container button:hover {
            background-color: #475569;
            opacity: 1;
        }

        .control-up {
            grid-column: 2;
        }

        .control-left {
            grid-column: 1;
        }

        .control-down {
            grid-column: 2;
        }

        .control-right {
            grid-column: 3;
        }

        /* Mobile optimization */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .chat-container {
                padding: 1.2rem;
            }

            .messages-box {
                min-height: 250px;
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 1rem;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .controls-container button {
                width: auto;
            }
        }
    </style>
</head>

<body>

    <h1>Robot esp-32 sterowanie </h1>

    <div class="chat-container">
        <div class="messages-box" id="messages-box">
            <div class="message system">Oczekiwanie na zainicjowanie komunikacji...</div>
        </div>

        <div class="controls-container">
            <div></div>
            <button class="control-up" onclick="sendMove('przód')">⬆️</button>
            <div></div>
            <button class="control-left" onclick="sendMove('lewo')">⬅️</button>
            <button class="control-down" onclick="sendMove('tył')">⬇️</button>
            <button class="control-right" onclick="sendMove('prawo')">➡️</button>
        </div>

        <div class="input-group">
            <input type="text" id="prompt-input" placeholder="Powiedz robotowi co ma zrobić, lub zadaj pytanie..."
                autocomplete="off">
            <button id="send-btn">Wyślij</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script>
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesBox = document.getElementById('messages-box');

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesBox.appendChild(div);
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        // --- Inicjalizacja Socket.IO ---
        addMessage("Nawiązanie połączenia z serwerem...", 'system');
        const socket = io(); // Podłącza się automatycznie pod ten sam adres

        socket.on('connect', () => {
            addMessage("Połączono z kanałem na żywo Socket.IO!", 'system');
        });

        socket.on('server_response', (data) => {
            addMessage(`Serwer: ${data.data}`, 'system');
        });

        socket.on('disconnect', () => {
            addMessage("Rozłączono z serwerem!", 'system');
        });
        // -------------------------------

        async function sendMove(direction) {
            try {
                await fetch('/api/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ direction: direction })
                });
                addMessage(`Ręczne sterowanie: ${direction.toUpperCase()}`, 'system');
            } catch (err) {
                addMessage("Błąd sterowania ręcznego.", 'system');
            }
        }

        async function sendPrompt() {
            const text = promptInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            promptInput.value = '';

            try {
                const res = await fetch('/api/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();

                if (data.error) {
                    addMessage("Błąd API: " + data.error, 'system');
                } else if (data.response) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage(JSON.stringify(data), 'bot');
                }
            } catch (err) {
                addMessage("Błąd połączenia z serwerem.", 'system');
            }
        }

        sendBtn.addEventListener('click', sendPrompt);
        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendPrompt();
        });
    </script>
    <footer>

        ©️ 2026 by BLC - Robot esp-32 sterowanie

    </footer>
</body>

</html>
