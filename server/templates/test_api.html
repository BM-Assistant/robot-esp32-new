<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API NVIDIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {text-align: center; color: #38bdf8;}
        form { display: flex; gap: 10px; margin-bottom: 2rem; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #1e293b; color: white;}
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #3b82f6; color: white; cursor: pointer; }
        #response-box { background: #1e293b; padding: 1rem; border-radius: 5px; min-height: 100px; white-space: pre-wrap; word-wrap: break-word;}
        a { color: #38bdf8; text-decoration: none; display: block; margin-top: 2rem; text-align: center;}
    </style>
</head>
<body>
    <h1>Prosty test NVIDIA API</h1>
    <p>Używane do prostej weryfikacji czy twój klucz NVIDIA .env działa we Flask.</p>

    <form id="test-form">
        <input type="text" id="promptInput" placeholder="Napisz coś do LLM..." required>
        <button type="submit">Wyślij</button>
    </form>

    <div>
        <strong>Wynik z NVIDIA LLM (Llama 8B):</strong>
        <div id="response-box">Oczekuję na test...</div>
    </div>

    <a href="/">Powrót na stronę główną</a>

    <script>
        document.getElementById('test-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('promptInput').value;
            const responseBox = document.getElementById('response-box');
            responseBox.textContent = "Ładowanie... [Czekam na odpowiedź NVIDIA NIM]";
            
            try {
                const res = await fetch('/api/test-nvapi', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: prompt})
                });
                const data = await res.json();
                
                if (data.error) {
                    responseBox.textContent = `BŁĄD: ${data.error}`;
                } else {
                    responseBox.textContent = data.response;
                }
            } catch (err) {
                responseBox.textContent = "Błąd połączenia z serwerem localnym.";
            }
        });
    </script>
</body>
</html>
